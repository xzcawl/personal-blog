# 云服务器 Nginx：80 端口反代到博客 Node 服务（8080）
# 安装：sudo cp deploy/nginx-blog.conf /etc/nginx/sites-available/blog
#       sudo ln -sf /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 120.48.157.95;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 发布文章时会触发构建，可能较慢
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# 若日后绑定自定义域名，可复制上述 server 块，把 server_name 改成你的域名，
# 并用 certbot 申请 HTTPS 后监听 443。
