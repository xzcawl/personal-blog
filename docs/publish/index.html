</style><script type="module" src="/personal-blog/_astro/hoisted.CL8vatKn.js"></script></head> <body> <header class="site-header"> <nav class="site-nav"> <a href="/personal-blog/" style="font-weight: 600; color: var(--text); text-decoration: none;">

adding: 0.65rem 0.85rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1rem;"> </label> <label style="display: flex; flex-direction: column; gap: 0.35rem;"> <span style="font-weight: 600; color: var(--text);">发布日期</span> <input id="field-date" type="date" required style="padding: 0.65rem 0.85rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1rem; max-width: 200px;"> </label> <label style="display: flex; flex-direction: column; gap: 0.35rem;"> <span style="font-weight: 600; color: var(--text);">更新日期（可选）</span> <input id="field-updated" type="date" style="padding: 0.65rem 0.85rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1rem; max-width: 200px;"> </label> <label style="display: flex; flex-direction: column; gap: 0.35rem;"> <span style="font-weight: 600; color: var(--text);">正文（Markdown）</span> <textarea id="field-body" required rows="16" placeholder="在这里写 Markdown 正文..." style="padding: 0.85rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.95rem; font-family: ui-monospace, monospace; resize: vertical;"></textarea> </label> <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;"> <button type="button" id="btn-publish" style="padding: 0.65rem 1.25rem; border-radius: var(--radius); border: none; background: var(--accent); color: #0f1419; font-weight: 600; cursor: pointer; font-size: 1rem;">

      const root = document.documentElement;
      const btn = document.getElementById('theme-toggle');
      btn?.addEventListener('click', () => {
        const next = root.dataset.theme === 'light' ? 'dark' : 'light';
        root.dataset.theme = next;
        localStorage.setItem('theme', next);
      });
    </script> </body> </html>
